<html lang="en">
    {{ partial "head.html" . }}

    <body>
        {{ partial "header.html" . }}

        <main>
            <h1 class="post-title">{{ .Title }}</h1>

            <span class="post-date">
                {{ .Date.Format "January 2, 2006" }}
            </span>

            {{ if .Params.image }}
            <img src="{{ .Params.image }}" alt="{{ .Title }}" />
            {{ end }} {{ .Content }}
        </main>

        {{ partial "footer.html" . }}
    </body>
</html>
