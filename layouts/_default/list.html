<html lang="en">
    {{ partial "head.html" . }}

    <body>
        <div class="container">
            {{ partial "header.html" . }}
            {{ partial "nav.html" . }}
            <main>
              <!--<strong>{{ .Title }}</strong>-->

              {{ .Content }}

              <ul>
                {{ range .Pages }}
                  <li>
                    <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                    -
                    <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
                      {{ .Date.Format "January 2, 2006" }}
                    </time>
                  </li>
                {{ end }}
              </ul>
            </main>

            <!--{{ partial "footer.html" . }}-->
        </div>
    </body>
</html>
