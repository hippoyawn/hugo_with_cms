<html lang="en">
  {{ partial "head.html" . }}

  <body>
    {{ partial "header.html" . }}

    <main>
      <h1>{{ .Title }}</h1>

      {{ .Content }}

      <ul>
        {{ range .Pages }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            -
            <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
              {{ .Date.Format "January 2, 2006" }}
            </time>
          </li>
        {{ end }}
      </ul>
    </main>

    {{ partial "footer.html" . }}
  </body>
</html>
